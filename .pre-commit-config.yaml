repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^\.github/ISSUE_TEMPLATE/
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.8
    hooks:
      - id: actionlint
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--check-hidden"]
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$
  - repo: local
    hooks:
      - id: repo-hygiene
        name: repo hygiene
        entry: python scripts/check_repo_hygiene.py
        language: system
        pass_filenames: false
      - id: run-tests
        name: run tests
        entry: pytest --tb=short -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [push]
      - id: dependency-integrity
        name: dependency integrity check
        entry: python scripts/verify_dependency_integrity.py
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
      - id: security-audit
        name: security audit
        entry: pip-audit --strict --requirement uv.lock
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
