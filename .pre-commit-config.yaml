repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        name: "🔒 security · Detect hardcoded secrets"

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: ["--fix", "--show-fixes"]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        additional_dependencies:
          - setuptools


  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-no-eval
      - id: python-no-log-warn

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        exclude: ^\.github/ISSUE_TEMPLATE/
        args:
          - >
            --config-data={
              extends: default,
              rules: {
                line-length: {max: 150},
                comments: {min-spaces-from-content: 1},
                document-start: disable,
                truthy: disable,
                commas: {max-spaces-after: 1}
              }
            }

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-lll"]
        additional_dependencies: ["bandit[toml]"]


  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        name: "🐍 python · Mypy checks"
        args: [--no-strict-optional, --ignore-missing-imports]
        exclude: ^src/tok/gateway|^scripts/|^tests/|^examples/
        additional_dependencies: ["pydantic", "httpx", "rich", "typer", "types-requests"]

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.391
    hooks:
      - id: pyright
        name: "🐍 python · Check types"
        args: [--level=warning]
        files: ^src/.*\.py$
        types: [python]
        additional_dependencies: ["pytest", "httpx", "pydantic", "tiktoken"]
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: sort-simple-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^\.github/ISSUE_TEMPLATE/
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
        name: "🌳 git · Detect conflict markers"
      - id: check-added-large-files
        name: "🌳 git · Block large file commits"
        args: ['--maxkb=5000']
      - id: debug-statements
      - id: detect-private-key
      - id: check-case-conflict
        name: " filesystem/ names · Check case sensitivity"
      - id: mixed-line-ending
      - id: check-executables-have-shebangs
        name: " filesystem/ exec · Verify shebang presence"
        exclude: ^scripts/check_repo_hygiene.py$
      - id: check-shebang-scripts-are-executable
        name: "📁 filesystem/⚙️ exec · Verify script permissions"
        exclude: ^scripts/check_repo_hygiene.py$
      - id: check-illegal-windows-names
        name: " filesystem/ names · Validate Windows filenames"
      - id: check-symlinks
        name: " filesystem/ symlink · Check symlink validity"
      - id: destroyed-symlinks
        name: " filesystem/ symlink · Detect broken symlinks"
      - id: forbid-new-submodules
        name: "🌳 git · Prevent submodule creation"
      - id: no-commit-to-branch
        name: "🌳 git · Protect main branches"
        args: ["--branch", "main", "--branch", "master"]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject
        name: "🐍 python · Validate pyproject.toml"

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.31.0
    hooks:
      - id: check-github-workflows
        name: "🐙 github-actions · Validate gh workflow files"
        args: ["--verbose"]

  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        name: "📝 markdown · Format markdown"
        additional_dependencies:
          - mdformat-gfm
          - mdformat-ruff
          - mdformat-frontmatter
          - ruff
        args: [--wrap=88]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: ["--disable", "MD013,MD033,MD034"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^scripts/.*\.sh$

  - repo: https://github.com/openstack/bashate
    rev: 2.1.1
    hooks:
      - id: bashate
        name: "🐚 shell · Check shell script code style"

  - repo: https://github.com/shssoichiro/oxipng
    rev: v9.1.3
    hooks:
      - id: oxipng
        name: "🖼️ images · Optimize PNG files"
        args: ["-o", "4", "--strip", "safe", "--alpha"]


  - repo: local
    hooks:
      - id: repo-hygiene
        name: repo hygiene
        entry: python scripts/check_repo_hygiene.py
        language: system
        pass_filenames: false
      - id: run-tests
        name: run tests
        entry: pytest --tb=short -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
      - id: dependency-integrity
        name: dependency integrity check
        entry: python scripts/verify_dependency_integrity.py
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
      - id: security-audit
        name: security audit
        entry: python scripts/run_security_audit.py
        language: system
        files: ^(uv\.lock|pyproject\.toml)$
        pass_filenames: false
