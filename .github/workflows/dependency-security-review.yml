name: Dependency Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  security-review:
    name: Security Review Check
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'security-review-required')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install security tools
        run: uv sync --frozen --extra dev

      - name: Check dependency age
        id: check_age
        run: |
          python3 << 'EOF'
          import tomllib
          from datetime import datetime, timezone
          import sys

          def check_dependencies():
              violations = []
              with open('uv.lock', 'rb') as f:
                  lock = tomllib.load(f)

              for package in lock.get('package', []):
                  source = package.get('source', {})
                  if isinstance(source, dict) and 'editable' in source:
                      continue

                  artifacts = []
                  sdist = package.get('sdist')
                  if isinstance(sdist, dict):
                      artifacts.append(sdist)
                  wheels = package.get('wheels', [])
                  if isinstance(wheels, list):
                      artifacts.extend(
                          artifact
                          for artifact in wheels
                          if isinstance(artifact, dict)
                      )

                  upload_times = []
                  for artifact in artifacts:
                      upload_time = artifact.get('upload-time')
                      if isinstance(upload_time, str):
                          upload_times.append(
                              datetime.fromisoformat(
                                  upload_time.replace('Z', '+00:00')
                              )
                          )

                  if not upload_times:
                      continue

                  package_age_days = (
                      datetime.now(timezone.utc) - min(upload_times)
                  ).days
                  if package_age_days < 90:
                      violations.append(
                          f"{package['name']}@{package['version']} "
                          f"is only {package_age_days} days old"
                      )

              return violations

          violations = check_dependencies()
          if violations:
              print("❌ SECURITY REVIEW REQUIRED:")
              for violation in violations:
                  print(f"  - {violation}")
              print("\n⚠️  Dependencies must be at least 90 days old for automatic approval")
              print("📋 Manual security review required before merging")
              sys.exit(1)
          else:
              print("✅ All dependencies meet 90-day age requirement")
              EOF

      - name: Run security audit
        run: |
          uv run python scripts/run_security_audit.py || echo "Security issues found - manual review required"

      - name: Add security review comment
        if: steps.check_age.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Review Required

              This PR contains dependency updates that require security review:

              - Dependencies must be at least 90 days old
              - Security audit must pass
              - Manual review by tokmacher members required

              ### Review Checklist:
              - [ ] Verify no known vulnerabilities in updated packages
              - [ ] Check package integrity and signatures
              - [ ] Review changelog for security changes
              - [ ] Test functionality with new versions
              - [ ] Confirm 90-day age requirement met

              ### Approval Process:
              1. Complete security review checklist
              2. Add comment "Security review completed - approved"
              3. Merge after at least one maintainer approval
              `
            })

  block-merge:
    name: Block Merge Without Review
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'security-review-required')

    steps:
      - name: Check for security review approval
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const approvalPhrase = 'Security review completed - approved';
            const allowedPermissions = new Set(['write', 'maintain', 'admin']);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const permissionCache = new Map();

            async function hasAllowedPermission(login) {
              if (!login) {
                return false;
              }
              if (permissionCache.has(login)) {
                return permissionCache.get(login);
              }
              try {
                const result = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: login,
                });
                const allowed = allowedPermissions.has(result.data.permission);
                permissionCache.set(login, allowed);
                return allowed;
              } catch (error) {
                if (error.status === 404) {
                  permissionCache.set(login, false);
                  return false;
                }
                throw error;
              }
            }

            let hasApproval = false;
            for (const comment of comments) {
              if (!comment.body.includes(approvalPhrase)) {
                continue;
              }
              if (await hasAllowedPermission(comment.user?.login)) {
                hasApproval = true;
                break;
              }
            }

            if (!hasApproval) {
              console.log('❌ Security review approval not found');
              core.setFailed('Security review approval required before merge');
            } else {
              console.log('✅ Security review approval found');
            }
