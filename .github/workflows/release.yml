name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Validate tag/version consistency
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project_version = pyproject["project"]["version"]
          init_text = Path("src/tok/__init__.py").read_text()
          match = re.search(r'^__version__\s*=\s*["\']([^"\']+)["\']', init_text, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to find __version__ in src/tok/__init__.py")

          package_version = match.group(1)
          tag_version = os.environ["GITHUB_REF_NAME"].removeprefix("v")

          if project_version != package_version:
              raise SystemExit(
                  f"pyproject version ({project_version}) does not match package version ({package_version})"
              )

          if project_version != tag_version:
              raise SystemExit(
                  f"Tag version ({tag_version}) does not match project version ({project_version})"
              )

          print(f"release version verified: {project_version}")
          PY
      - run: uv sync --frozen --extra dev
      - run: uv run pre-commit run --all-files
      - run: uv run ruff check src/tok tests
      - run: uv run mypy src/tok
      - run: uv run pytest tests/unit tests/integration -v --cov=src/tok --cov-report=term-missing --cov-fail-under=80
      - run: uv run python scripts/check_repo_hygiene.py
      - run: uv run python scripts/run_security_audit.py
      - run: uv run python scripts/run_release_smoke.py

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv build
      - run: uv run --with twine python -m twine check dist/*.whl dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/tok-protocol/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
