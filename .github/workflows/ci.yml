name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run python scripts/check_repo_hygiene.py
      - run: SKIP=gitleaks uv run pre-commit run --all-files
      - name: gitleaks (dedicated)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: uv run ruff check src/tok tests
      - run: uv run python scripts/run_security_audit.py
      - run: uvx pip-audit
      - name: Safety report (non-blocking)
        run: uv run safety check --output json > safety-report.json || true
      - run: uv run python scripts/verify_dependency_integrity.py

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run mypy src/tok

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/unit tests/integration -v -x --cov=src/tok --cov-report=term-missing --cov-report=xml --cov-fail-under=80
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        env:
          TOK_PROJECT_DIR: ${{ runner.temp }}/tok-ci-test-state
      - run: uv run pytest tests/unit tests/integration -v -x
        if: matrix.python-version != '3.12' || matrix.os != 'ubuntu-latest'
        env:
          TOK_PROJECT_DIR: ${{ runner.temp }}/tok-ci-test-state
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release-candidate:
    name: Release Candidate (Smoke + Claims)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run python scripts/run_release_smoke.py --benchmark-mode smoke --benchmark-output tmp/release-candidate
      - uses: actions/upload-artifact@v4
        with:
          name: release-candidate-artifacts
          path: tmp/release-candidate/

  tag-release:
    name: Auto-tag Release
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create version tag if missing
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists; skipping."
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
