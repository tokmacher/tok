name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]" pip-audit safety uv
      - run: python scripts/check_repo_hygiene.py
      - run: pre-commit run --all-files
      - run: ruff check src/tok tests
      - run: python scripts/run_security_audit.py
      - run: safety check --json --output safety-report.json || echo "Safety check found issues"
      - run: python scripts/verify_dependency_integrity.py

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: mypy src/tok

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit tests/integration -v -x --cov=src/tok --cov-report=term-missing --cov-report=xml --cov-fail-under=80
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
      - run: pytest tests/unit tests/integration -v -x
        if: matrix.python-version != '3.12' || matrix.os != 'ubuntu-latest'
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
