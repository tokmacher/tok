name: SBOM Generation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Generate SBOM from uv.lock
        run: |
          uv export --locked --no-dev --format cyclonedx1.5 --output-file sbom.json

      - name: Generate SPDX SBOM
        run: |
          pip install spdx-tools
          python scripts/generate_spdx_sbom.py

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom.json
            sbom.spdx
          retention-days: 90

      - name: Analyze dependency tree
        run: |
          python scripts/analyze_dependency_tree.py

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-analysis
          path: dependency-analysis.json
          retention-days: 90
