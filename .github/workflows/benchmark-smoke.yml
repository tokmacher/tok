name: Benchmark Smoke

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Benchmark scope to run
        required: true
        type: choice
        options:
          - smoke
          - public_full
      model:
        description: Model identifier to benchmark
        required: false
        default: anthropic/claude-sonnet-4.6
        type: string

permissions:
  contents: read

jobs:
  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run release smoke with benchmarks
        env:
          BENCHMARK_OUTPUT: ${{ github.workspace }}/tmp/benchmark-smoke
          BENCHMARK_MODE: ${{ inputs.mode }}
          MODEL: ${{ inputs.model }}
        run: |
          uv run python scripts/run_release_smoke.py \
            --benchmark-mode "$BENCHMARK_MODE" \
            --benchmark-output "$BENCHMARK_OUTPUT" \
            --model "$MODEL"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-${{ inputs.mode }}
          path: tmp/benchmark-smoke/
